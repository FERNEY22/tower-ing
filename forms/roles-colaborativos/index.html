<html lang="es">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a2a6c;
      color: white;
      text-align: center;
      padding: 35px 20px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: "";
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80') no-repeat center;
      background-size: cover;
      opacity: 0.15; z-index: 1;
    }
    header .content { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; }
    header h1 { font-size: 2rem; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,.3); }
    header p  { font-size: 1rem; opacity: .9; }

    /* BARRA DE PROGRESO */
    .progress-bar-wrap {
      background: #1a2a6c;
      padding: 10px 20px 14px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .progress-info {
      display: flex; justify-content: space-between;
      color: rgba(255,255,255,.75); font-size: .82rem;
      margin-bottom: 6px;
    }
    .progress-track {
      height: 6px; background: rgba(255,255,255,.2);
      border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #27ae60;
      border-radius: 3px; width: 0%;
      transition: width .45s cubic-bezier(.4,0,.2,1);
    }

    /* CONTENEDOR PRINCIPAL */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* TARJETA */
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 40px 35px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 8px 30px rgba(0,0,0,.12);
      animation: aparecer .35s ease both;
    }
    @keyframes aparecer {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* PANTALLA INICIO */
    .intro-icon { font-size: 3rem; text-align: center; margin-bottom: 12px; }
    .card h2 { color: #1a2a6c; font-size: 1.5rem; margin-bottom: 8px; text-align: center; }
    .card .subtitle { color: #7f8c8d; font-size: .9rem; text-align: center; margin-bottom: 28px; line-height: 1.5; }

    .stats-row {
      display: flex; justify-content: center; gap: 30px;
      margin-bottom: 28px;
      padding: 16px; background: #f8f9fa; border-radius: 10px;
    }
    .stat { text-align: center; }
    .stat-n { font-size: 1.6rem; font-weight: 700; color: #1a2a6c; line-height: 1; }
    .stat-l { font-size: .75rem; color: #7f8c8d; margin-top: 2px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-weight: 600; font-size: .85rem; color: #555; margin-bottom: 5px; }
    .field input {
      width: 100%; padding: 11px 14px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: .95rem; font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,.12); }

    /* PANTALLA PREGUNTA */
    .q-step {
      font-size: .78rem; font-weight: 700; color: #3498db;
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .q-text {
      font-size: 1.1rem; font-weight: 600; color: #2c3e50;
      margin-bottom: 24px; line-height: 1.55;
    }

    .option {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 16px; border-radius: 10px;
      border: 2px solid #e8ecf0; cursor: pointer;
      margin-bottom: 10px;
      transition: border-color .2s, background .2s, transform .15s;
      font-size: .93rem; color: #2c3e50; line-height: 1.45;
    }
    .option:hover { border-color: #3498db; background: #f0f7ff; transform: translateX(3px); }
    .option.selected { border-color: #1a2a6c; background: #eef3ff; }
    .option .opt-radio {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #ccc; flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, background .2s;
    }
    .option.selected .opt-radio { border-color: #1a2a6c; background: #1a2a6c; }
    .option.selected .opt-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: white; }

    /* BOTONES */
    .btn-row { display: flex; gap: 12px; margin-top: 28px; align-items: center; }
    .btn {
      padding: 12px 28px; border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 8px;
    }
    .btn-primary { background: #1a2a6c; color: white; flex: 1; justify-content: center; }
    .btn-primary:hover:not(:disabled) { background: #253a8c; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(26,42,108,.3); }
    .btn-primary:disabled { background: #95a5a6; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-back-q { background: #f0f0f0; color: #555; }
    .btn-back-q:hover { background: #e0e0e0; }
    .err-inline { font-size: .82rem; color: #e74c3c; margin-top: 6px; text-align: center; }

    /* PANTALLA RESULTADO */
    .result-icon { font-size: 4rem; text-align: center; margin-bottom: 12px; }
    .result-rol  { font-size: 1.8rem; font-weight: 800; color: #1a2a6c; text-align: center; margin-bottom: 8px; }
    .result-name { font-size: .9rem; color: #7f8c8d; text-align: center; margin-bottom: 18px; }
    .result-desc {
      background: #f0f7ff; border-left: 4px solid #3498db;
      border-radius: 0 8px 8px 0; padding: 14px 18px;
      font-size: .9rem; color: #2c3e50; line-height: 1.6;
      margin-bottom: 22px;
    }
    .puntajes-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 22px;
    }
    .punt-item {
      background: #f8f9fa; border-radius: 10px; padding: 14px;
      border: 2px solid #eee; text-align: center;
      transition: border-color .2s;
    }
    .punt-item.winner { background: #eef3ff; border-color: #1a2a6c; }
    .punt-label { font-size: .72rem; color: #7f8c8d; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .punt-val   { font-size: 1.6rem; font-weight: 700; color: #1a2a6c; line-height: 1; }
    .punt-item.winner .punt-val { color: #2980b9; }
    .ref-box {
      background: #f8f9fa; border-radius: 8px;
      padding: 12px 16px; text-align: center;
      font-size: .82rem; color: #7f8c8d; margin-bottom: 20px;
    }
    .ref-code { font-family: monospace; background: #e8ecf0; padding: 2px 8px; border-radius: 4px; color: #2c3e50; font-size: .88rem; }
    .btn-volver {
      display: block; text-align: center; padding: 12px;
      background: #3498db; color: white; border-radius: 8px;
      text-decoration: none; font-weight: 600;
      transition: background .2s;
    }
    .btn-volver:hover { background: #2980b9; }

    footer { text-align: center; padding: 20px; color: #7f8c8d; font-size: .85rem; }

    @media (max-width: 520px) {
      .card { padding: 28px 20px 24px; border-radius: 12px; }
      .q-text { font-size: 1rem; }
      .puntajes-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

      { texto: "Organizo una reunión o detalle simbólico para agradecer a cada uno según su aporte.", puntos: { comunicador: 3, coordinador: 2 } },
      { texto: "Busco qué podríamos haber hecho aún mejor, para el próximo reto.", puntos: { investigador: 3, analista: 2 } },
      { texto: "Documento el proceso y lo comparto con otros equipos como ejemplo.", puntos: { coordinador: 3, comunicador: 1 } }
    ]},
    { texto: "¿Qué tipo de tarea te hace perder la noción del tiempo?", opciones: [
      { texto: "Organizar un evento, planificar cada detalle y ver cómo todo encaja perfecto.", puntos: { coordinador: 3 } },
      { texto: "Explicar algo complejo de forma simple y ver la cara de entendimiento de los demás.", puntos: { comunicador: 3 } },
      { texto: "Sumergirte en un tema nuevo, leyendo, viendo videos, conectando ideas.", puntos: { investigador: 3 } },
      { texto: "Resolver un rompecabezas de datos, encontrar patrones o hacer una visualización clara.", puntos: { analista: 3 } }
    ]}
  ];

  const DESCRIPCIONES = {
    coordinador:       { icon: '🎯', texto: 'Organizas, planificas y aseguras que el equipo avance. Tienes visión de conjunto y facilidad para delegar y mantener el ritmo del grupo.' },
    comunicador:       { icon: '💬', texto: 'Eres el puente entre las personas. Escuchas activamente, medias conflictos y transmites ideas con claridad y empatía.' },
    investigador:      { icon: '🔍', texto: 'Profundizas en los temas antes de actuar. Buscas fuentes confiables, analizas el contexto y aportas conocimiento sólido al equipo.' },
    'analista de datos': { icon: '📊', texto: 'Conviertes información en decisiones. Identificas patrones, construyes evidencia y propones mejoras basadas en datos concretos.' }
  };

  // ── ESTADO ──
  let estado = { pantalla: 'inicio', preguntaActual: 0, respuestas: [], userData: {} };

  // ── PROGRESO ──
  function setProgreso(n, total) {
    const pct = total === 0 ? 0 : Math.round(n / total * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-label').textContent =
      n === 0 ? 'Datos personales' : n > total ? 'Completado' : `Pregunta ${n} de ${total}`;
    document.getElementById('prog-pct').textContent = total > 0 ? pct + '%' : '';
  }

  // ── RENDER ──
  function render() {
    const card = document.getElementById('card');
    card.innerHTML = '';
    // Re-trigger animation
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = '';

    if (estado.pantalla === 'inicio')    renderInicio(card);
    else if (estado.pantalla === 'quiz') renderPregunta(card);
    else if (estado.pantalla === 'fin')  renderResultado(card);
  }

  function renderInicio(card) {
    setProgreso(0, 0);
    card.innerHTML = `
      <div class="intro-icon">🧠</div>
      <h2>¿Cuál es tu rol ideal en equipo?</h2>
      <p class="subtitle">Responde 20 situaciones reales. Al final descubrirás si eres<br>
        <strong>Coordinador, Comunicador, Investigador o Analista de Datos.</strong></p>
      <div class="stats-row">
        <div class="stat"><div class="stat-n">20</div><div class="stat-l">Preguntas</div></div>
        <div class="stat"><div class="stat-n">~8</div><div class="stat-l">Minutos</div></div>
        <div class="stat"><div class="stat-n">4</div><div class="stat-l">Roles</div></div>
      </div>
      <div class="field">
        <label><i class="fas fa-user"></i> Nombre</label>
        <input type="text" id="f-nombre" placeholder="Ej: María" autocomplete="given-name"/>
      </div>
      <div class="field">
        <label><i class="fas fa-user"></i> Apellido</label>
        <input type="text" id="f-apellido" placeholder="Ej: Torres" autocomplete="family-name"/>
      </div>
      <div class="field">
        <label><i class="fas fa-id-card"></i> Número de identificación</label>
        <input type="text" id="f-id" placeholder="Ej: 1234567890"/>
      </div>
      <p class="err-inline" id="err-inicio"></p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="comenzar()">
          <i class="fas fa-play"></i> Comenzar
        </button>
      </div>
      <div style="text-align:center;margin-top:16px">
        <a href="/forms/" style="color:#95a5a6;font-size:.82rem;text-decoration:none">
          <i class="fas fa-arrow-left"></i> Volver a Herramientas
        </a>
      </div>`;

    // Enter para comenzar
    setTimeout(() => {
      document.getElementById('f-id').addEventListener('keydown', e => { if(e.key==='Enter') comenzar(); });
    }, 50);
  }

  function renderPregunta(card) {
    const i = estado.preguntaActual;
    const p = PREGUNTAS[i];
    const respActual = estado.respuestas[i] ?? null;
    setProgreso(i + 1, PREGUNTAS.length);

    card.innerHTML = `
      <div class="q-step">Pregunta ${i + 1} de ${PREGUNTAS.length}</div>
      <p class="q-text">${p.texto}</p>
      <div id="opciones"></div>
      <p class="err-inline" id="err-q"></p>
      <div class="btn-row">
        ${i > 0 ? `<button class="btn btn-back-q" onclick="irAtras()"><i class="fas fa-arrow-left"></i> Atrás</button>` : ''}
        <button class="btn btn-primary" id="btn-sig" onclick="avanzar()">
          ${i < PREGUNTAS.length - 1 ? 'Siguiente <i class="fas fa-arrow-right"></i>' : '<i class="fas fa-check"></i> Ver mi resultado'}
        </button>
      </div>`;

    const cont = document.getElementById('opciones');
    p.opciones.forEach((op, j) => {
      const div = document.createElement('div');
      div.className = 'option' + (respActual === j ? ' selected' : '');
      div.innerHTML = `<div class="opt-radio"></div><span>${op.texto}</span>`;
      div.addEventListener('click', () => {
        estado.respuestas[i] = j;
        cont.querySelectorAll('.option').forEach(d => d.classList.remove('selected'));
        div.classList.add('selected');
        document.getElementById('err-q').textContent = '';
      });
      cont.appendChild(div);
    });
  }

  function renderResultado(card) {
    setProgreso(PREGUNTAS.length + 1, PREGUNTAS.length);
    document.getElementById('prog-label').textContent = '¡Completado!';
    document.getElementById('prog-pct').textContent = '100%';
    document.getElementById('prog-fill').style.width = '100%';

    // Calcular puntajes
    let puntajes = { coordinador: 0, comunicador: 0, investigador: 0, 'analista de datos': 0 };
    PREGUNTAS.forEach((p, i) => {
      if (estado.respuestas[i] == null) return;
      const op = p.opciones[estado.respuestas[i]];
      for (let rol in op.puntos) {
        if (rol === 'analista') puntajes['analista de datos'] += op.puntos[rol];
        else puntajes[rol] += op.puntos[rol];
      }
    });
    const maxRol = Object.keys(puntajes).reduce((a,b) => puntajes[a] > puntajes[b] ? a : b);
    const info   = DESCRIPCIONES[maxRol];

    card.innerHTML = `
      <div class="result-icon">${info.icon}</div>
      <div class="result-rol">${maxRol.toUpperCase()}</div>
      <div class="result-name">${estado.userData.nombre} ${estado.userData.apellido} · ID ${estado.userData.id}</div>
      <div class="result-desc">${info.texto}</div>
      <div class="puntajes-grid">
        ${Object.entries(puntajes).map(([r,v]) => `
          <div class="punt-item ${r===maxRol?'winner':''}">
            <div class="punt-label">${r}</div>
            <div class="punt-val">${v}<small style="font-size:.55em;color:#aaa"> pts</small></div>
          </div>`).join('')}
      </div>
      <div class="ref-box" id="ref-box">
        <i class="fas fa-spinner fa-spin"></i> Guardando resultado…
      </div>
      <a href="/forms/" class="btn-volver"><i class="fas fa-home"></i> Volver a Herramientas</a>`;

    // Guardar en Firebase
    window._guardarRol({
      nombre: estado.userData.nombre,
      apellido: estado.userData.apellido,
      identificacion: estado.userData.id,
      rolNatural: maxRol,
      puntajes
    }).then(key => {
      document.getElementById('ref-box').innerHTML =
        `<i class="fas fa-check-circle" style="color:#27ae60"></i>
         Resultado guardado · Código: <span class="ref-code">${key}</span><br>
         <small>Guarda este código. Tu docente lo usará para formar grupos equilibrados.</small>`;
    }).catch(() => {
      document.getElementById('ref-box').innerHTML =
        `<i class="fas fa-exclamation-triangle" style="color:#e74c3c"></i>
         No se pudo guardar en la nube. Muéstrale esta pantalla a tu docente.`;
    });
  }

  // ── ACCIONES ──
  function comenzar() {
    const nombre   = document.getElementById('f-nombre').value.trim();
    const apellido = document.getElementById('f-apellido').value.trim();
    const id       = document.getElementById('f-id').value.trim();
    if (!nombre || !apellido || !id) {
      document.getElementById('err-inicio').textContent = 'Por favor completa todos los campos.';
      return;
    }
    estado.userData   = { nombre, apellido, id };
    estado.pantalla   = 'quiz';
    estado.preguntaActual = 0;
    estado.respuestas = [];
    render();
  }

  function avanzar() {
    const i = estado.preguntaActual;
    if (estado.respuestas[i] == null) {
      document.getElementById('err-q').textContent = 'Selecciona una opción para continuar.';
      return;
    }
    if (i < PREGUNTAS.length - 1) {
      estado.preguntaActual++;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      estado.pantalla = 'fin';
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  function irAtras() {
    if (estado.preguntaActual > 0) {
      estado.preguntaActual--;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  window.comenzar  = comenzar;
  window.avanzar   = avanzar;
  window.irAtras   = irAtras;

  // Iniciar
  render();
  </script>
</body>
</html>
