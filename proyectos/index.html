<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Proyectos – Towers Ing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #161b22 0%, #1f2937 100%);
      border-bottom: 1px solid #30363d;
      padding: 3rem 2rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.2rem;
      color: #58a6ff;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #8b949e;
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .container {
      max-width: 1100px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    /* Proyecto destacado */
    .destacado {
      background: linear-gradient(135deg, #1a2332 0%, #162032 100%);
      border: 1px solid #1f6feb;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .destacado::before {
      content: '★ PROYECTO DESTACADO';
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 0.7rem;
      color: #f0c040;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .destacado h2 {
      font-size: 1.6rem;
      color: #58a6ff;
      margin-bottom: 0.5rem;
    }

    .destacado .estado {
      display: inline-block;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .destacado p.desc {
      color: #c9d1d9;
      line-height: 1.7;
      margin-bottom: 1.2rem;
    }

    /* Grid de proyectos */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.5rem;
      transition: border-color 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      border-color: #58a6ff;
      transform: translateY(-2px);
    }

    .card h3 {
      font-size: 1rem;
      color: #e6edf3;
      margin-bottom: 0.4rem;
    }

    .card .desc {
      font-size: 0.875rem;
      color: #8b949e;
      line-height: 1.6;
      flex: 1;
      margin-bottom: 1rem;
    }

    /* Tags de tecnologías */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .tag {
      font-size: 0.7rem;
      padding: 3px 9px;
      border-radius: 20px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
    }

    .destacado .tags .tag {
      background: #162032;
      border-color: #1f6feb;
      color: #58a6ff;
    }

    /* Estados */
    .estado-finalizado { background: #1a2f1a; color: #3fb950; }
    .estado-desarrollo { background: #2a1a00; color: #d29922; }
    .estado-prototipo  { background: #1a1a2e; color: #a371f7; }

    /* Botón */
    .btn {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: #1f6feb;
      color: #fff;
    }

    .btn-secondary {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      cursor: default;
    }

    /* Fecha */
    .fecha {
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 0.5rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #8b949e;
      font-size: 0.85rem;
      border-top: 1px solid #21262d;
      margin-top: 3rem;
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.6rem; }
      .destacado::before { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Mis Proyectos</h1>
  <p>Desarrollos tecnológicos aplicados a la educación, ingeniería y colaboración.</p>
</header>

<div class="container">
  <!-- Proyecto destacado -->
  <div id="destacado-container"></div>

  <!-- Grid de proyectos -->
  <div class="grid" id="proyectos-grid"></div>
</div>

<footer>
  <a href="https://tower-ing.com/">← Volver al Inicio</a>
  &nbsp;|&nbsp;
  © 2025 Towers Ing. Todos los derechos reservados.
</footer>

<!-- Datos -->
<script src="proyectos.js"></script>

<script>
  function getEstadoClass(estado) {
    if (estado === 'Finalizado') return 'estado-finalizado';
    if (estado === 'En desarrollo') return 'estado-desarrollo';
    return 'estado-prototipo';
  }

  function renderDestacado(p) {
    const fechaTxt = p.fecha ? `Finalizado: ${p.fecha}` : p.estado;
    const tagsHtml = p.tecnologias.map(t => `<span class="tag">${t}</span>`).join('');
    return `
      <div class="destacado">
        <span class="estado ${getEstadoClass(p.estado)}">${p.estado}</span>
        <h2>${p.titulo}</h2>
        <p class="desc">${p.descripcion}</p>
        <div class="tags">${tagsHtml}</div>
        <a href="${p.link}" class="btn btn-primary">Ver proyecto →</a>
      </div>
    `;
  }

  function renderCard(p) {
    const fechaTxt = p.fecha ? `<div class="fecha">Finalizado: ${p.fecha}</div>` : `<div class="fecha">${p.estado}</div>`;
    const tagsHtml = p.tecnologias.map(t => `<span class="tag">${t}</span>`).join('');
    const btnHtml = p.link !== '#'
      ? `<a href="${p.link}" class="btn btn-primary">Ver detalles →</a>`
      : `<span class="btn btn-secondary">Ver detalles</span>`;

    return `
      <div class="card">
        ${fechaTxt}
        <h3>${p.titulo}</h3>
        <p class="desc">${p.descripcion}</p>
        <div class="tags">${tagsHtml}</div>
        ${btnHtml}
      </div>
    `;
  }

  // Renderizar
  const destacado = proyectos.find(p => p.destacado);
  const resto = proyectos.filter(p => !p.destacado);

  if (destacado) {
    document.getElementById('destacado-container').innerHTML = renderDestacado(destacado);
  }

  document.getElementById('proyectos-grid').innerHTML = resto.map(renderCard).join('');
</script>

</body>
</html>
